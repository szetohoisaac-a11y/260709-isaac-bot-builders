  <rect x="10" y="368" width="285" height="44" rx="8" fill="#fff" stroke="#45ACF4" stroke-width="2"/>
  <rect x="18" y="374" width="60" height="20" rx="4" fill="#45ACF4"/>
  <text x="48" y="388" text-anchor="middle" fill="white" font-family="Quicksand,sans-serif" font-size="10" font-weight="700">P5</text>
  <text x="90" y="389" fill="#888" font-family="Quicksand,sans-serif" font-size="10">Chips: ______  Won cards →</text>
