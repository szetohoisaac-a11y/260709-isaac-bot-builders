  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="600" height="36" rx="6" fill="#213F99"/>
  <text x="300" y="24" text-anchor="middle" fill="white" font-family="Quicksand,sans-serif" font-size="16" font-weight="700">BOT BUILDERS — AUCTION BIDDING BOARD</text>

  <!-- AUCTION POOL -->
  <rect x="10" y="44" width="580" height="180" rx="8" fill="#F2F9FE" stroke="#45ACF4" stroke-width="2" stroke-dasharray="8,3"/>
  <rect x="18" y="52" width="564" height="26" rx="4" fill="#45ACF4"/>
  <text x="300" y="70" text-anchor="middle" fill="white" font-family="Quicksand,sans-serif" font-size="14" font-weight="700">AUCTION POOL — Deal 20 + (5 × players) cards face-up here</text>

  <!-- Card slots in the pool -->
  <g fill="none" stroke="#A6CEEC" stroke-width="1.5" rx="3">
    <rect x="25" y="88" width="85" height="56" fill="#fff"/>
    <rect x="118" y="88" width="85" height="56" fill="#fff"/>
    <rect x="211" y="88" width="85" height="56" fill="#fff"/>
    <rect x="304" y="88" width="85" height="56" fill="#fff"/>
    <rect x="397" y="88" width="85" height="56" fill="#fff"/>
    <rect x="490" y="88" width="85" height="56" fill="#fff"/>
