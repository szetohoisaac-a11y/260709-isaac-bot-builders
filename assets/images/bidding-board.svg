  <rect x="18" y="264" width="260" height="22" rx="3" fill="#F2F9FE" stroke="#A6CEEC" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="148" y="279" text-anchor="middle" fill="#AAA" font-family="Quicksand,sans-serif" font-size="9">Won cards go here</text>

