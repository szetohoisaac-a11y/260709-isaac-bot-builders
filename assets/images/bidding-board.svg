  <text x="385" y="389" fill="#888" font-family="Quicksand,sans-serif" font-size="10">Chips: ______  Won cards →</text>
  <rect x="493" y="378" width="80" height="16" rx="3" fill="#F2F9FE" stroke="#A6CEEC" stroke-width="1" stroke-dasharray="4,2"/>
