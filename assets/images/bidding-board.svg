  <text x="385" y="320" fill="#888" font-family="Quicksand,sans-serif" font-size="10">Chips: ______</text>
  <text x="495" y="320" fill="#888" font-family="Quicksand,sans-serif" font-size="10">Won cards →</text>
  <rect x="313" y="332" width="260" height="22" rx="3" fill="#F2F9FE" stroke="#A6CEEC" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="443" y="347" text-anchor="middle" fill="#AAA" font-family="Quicksand,sans-serif" font-size="9">Won cards go here</text>

