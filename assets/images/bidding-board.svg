  <text x="300" y="220" text-anchor="middle" fill="#888" font-family="Quicksand,sans-serif" font-size="10">Cards placed here during auction · bid 1 chip at a time · pass when done</text>

  <!-- Player zones - 3 rows of 2 for up to 6 players -->
  <!-- Row 1: Player 1 + Player 2 -->
